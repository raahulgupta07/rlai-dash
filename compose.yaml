services:
  dash-db:
    image: pgvector/pgvector:pg18-trixie
    container_name: dash-db
    restart: always
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=1GB
        -c work_mem=32MB
        -c effective_cache_size=3GB
        -c maintenance_work_mem=256MB
        -c password_encryption=scram-sha-256
        -c idle_in_transaction_session_timeout=60000
        -c statement_timeout=120000
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 4G

  dash-pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dash-pgbouncer
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      DATABASE_URL: postgres://${DB_USER:-ai}:${DB_PASS:-ai}@dash-db:5432/${DB_DATABASE:-ai}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 3000
      DEFAULT_POOL_SIZE: 80
      MIN_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 20
      MAX_DB_CONNECTIONS: 200
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_IDLE_TIMEOUT: 300
      CLIENT_IDLE_TIMEOUT: 600
      QUERY_WAIT_TIMEOUT: 30
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    depends_on:
      dash-db:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 512M

  dash-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-dash}:${IMAGE_TAG:-latest}
    container_name: dash-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${WORKERS:-8}
    restart: always
    ports:
      - "8001:8000"
    environment:
      # Core
      - RUNTIME_ENV=prd
      - PYTHONPATH=/app
      - AGNO_DEBUG=False
      - AGENTOS_URL=http://127.0.0.1:8000
      # Database — goes through PgBouncer
      - DB_HOST=dash-pgbouncer
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ai}
      - DB_PASS=${DB_PASS:-ai}
      - DB_DATABASE=${DB_DATABASE:-ai}
      # Scaling
      - RATE_LIMIT=${RATE_LIMIT:-500/minute}
      # Required
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPER_ADMIN=${SUPER_ADMIN:-admin}
      - SUPER_ADMIN_PASS=${SUPER_ADMIN_PASS:-admin}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - DOMAIN=${DOMAIN:-localhost}
      # Optional — Keycloak SSO
      - KEYCLOAK_URL=${KEYCLOAK_URL:-}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-dash}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-dash-app}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      # Optional — Slack
      - SLACK_TOKEN=${SLACK_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    volumes:
      - knowledge_data:/app/knowledge
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      dash-db:
        condition: service_healthy
      dash-pgbouncer:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 8G

  caddy:
    image: caddy:2-alpine
    container_name: dash-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dash-api
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 512M

  dash-ml:
    build:
      context: .
      dockerfile: ml_worker/Dockerfile
    container_name: dash-ml
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://ai:${DB_PASS:-ai}@dash-pgbouncer:6432/ai
    depends_on:
      dash-db:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  dash:

volumes:
  pgdata:
  knowledge_data:
  caddy_data:
  caddy_config:
