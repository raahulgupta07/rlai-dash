services:
  dash-db:
    image: agnohq/pgvector:18
    container_name: dash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - dash

  dash-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-dash}:${IMAGE_TAG:-latest}
    container_name: dash-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - RUNTIME_ENV=dev
      - AGNO_DEBUG=True
      - AGENTOS_URL=http://127.0.0.1:8000
      - PYTHONPATH=/app
      # Database
      - DB_HOST=dash-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ai}
      - DB_PASS=${DB_PASS:-ai}
      - DB_DATABASE=${DB_DATABASE:-ai}
      - WAIT_FOR_DB=True
      # API keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Slack
      - SLACK_TOKEN=${SLACK_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    depends_on:
      - dash-db
    networks:
      - dash
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  dash:

volumes:
  pgdata:
